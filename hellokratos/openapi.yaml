                    type: integer
                    format: int32
                contentType:
                    type: integer
                    format: int32
                createdAt:
                    type: string
            description: 聊天消息
        api.rider.v1.AIAgentFAQItem:
            type: object
            properties:
                id:
                    type: string
                question:
                    type: string
                answer:
                    type: string
                category:
                    type: string
                viewCount:
                    type: integer
                    format: int32
            description: 常见问题项
        api.rider.v1.AIAgentGetChatHistoryReply:
            type: object
            properties:
                messages:
                    type: array
                    items:
                        $ref: '#/components/schemas/api.rider.v1.AIAgentChatMessage'
                hasMore:
                    type: boolean
            description: 获取聊天历史响应
        api.rider.v1.AIAgentGetFAQListReply:
            type: object
            properties:
                faqs:
                    type: array
                    items:
                        $ref: '#/components/schemas/api.rider.v1.AIAgentFAQItem'
            description: 获取常见问题列表响应
