components:
    schemas:
        api.rider.v1.AIAction:
            type: object
            properties:
                actionType:
                    type: string
                actionName:
                    type: string
                actionParams:
                    type: string
            description: 可执行操作
        api.rider.v1.AIAgentChatMessage:
            type: object
            properties:
                id:
                    type: string
                riderId:
                    type: string
                content:
                    type: string
