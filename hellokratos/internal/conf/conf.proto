syntax = "proto3";
package kratos.api;

option go_package = "hellokratos/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string source = 1;
  }
  message Redis {
    string addr = 1;
    string password = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  message Rabbitmq {
    string addr = 1;
    string username = 2;
    string password = 3;
    string virtual_host = 4;
    google.protobuf.Duration connection_timeout = 5;
  }
  message Sms {
    string api_id = 1;
    string api_key = 2;
  }
  Database database = 1;
  Redis redis = 2;
  Rabbitmq rabbitmq = 3;
  Sms sms = 4;
}
