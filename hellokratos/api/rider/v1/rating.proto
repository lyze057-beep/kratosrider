syntax = "proto3";

package api.rider.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "hellokratos/api/rider/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.rider.v1";
option java_outer_classname = "RiderRatingProtoV1";

// 评价服务
service Rating {
  // 提交订单评价
  rpc SubmitOrderRating (SubmitOrderRatingRequest) returns (SubmitOrderRatingReply) {
    option (google.api.http) = {
      post: "/rider/v1/rating/order"
      body: "*"
    };
  }

  // 获取骑手评价列表
  rpc GetRiderRatings (GetRiderRatingsRequest) returns (GetRiderRatingsReply) {
    option (google.api.http) = {
      get: "/rider/v1/ratings"
    };
  }

  // 获取骑手评分统计
  rpc GetRiderRatingStats (GetRiderRatingStatsRequest) returns (GetRiderRatingStatsReply) {
    option (google.api.http) = {
      get: "/rider/v1/rating/stats"
    };
  }

  // 提交投诉
  rpc SubmitComplaint (SubmitComplaintRequest) returns (SubmitComplaintReply) {
    option (google.api.http) = {
      post: "/rider/v1/complaint"
      body: "*"
    };
  }

  // 获取投诉列表
  rpc GetComplaints (GetComplaintsRequest) returns (GetComplaintsReply) {
    option (google.api.http) = {
      get: "/rider/v1/complaints"
    };
  }
}

// 提交订单评价请求
message SubmitOrderRatingRequest {
  int64 order_id = 1;           // 订单ID
  int64 rider_id = 2;           // 骑手ID
  int32 rating = 3;             // 评分(1-5)
  repeated string tags = 4;     // 评价标签
  string comment = 5;           // 评价内容
  repeated string images = 6;   // 评价图片
}

// 提交订单评价响应
message SubmitOrderRatingReply {
  bool success = 1;
  string message = 2;
  int64 rating_id = 3;
}

// 获取骑手评价列表请求
message GetRiderRatingsRequest {
  int64 rider_id = 1;           // 骑手ID
  int32 page = 2;               // 页码
  int32 page_size = 3;          // 每页数量
  int32 rating_filter = 4;      // 评分筛选(0=全部,1-5=对应评分)
}

// 获取骑手评价列表响应
message GetRiderRatingsReply {
  repeated RatingInfo ratings = 1;
  int32 total = 2;
  double average_rating = 3;    // 平均评分
}

// 评价信息
message RatingInfo {
  int64 id = 1;
  int64 order_id = 2;
  int64 rider_id = 3;
  int32 rating = 4;
  repeated string tags = 5;
  string comment = 6;
  repeated string images = 7;
  google.protobuf.Timestamp created_at = 8;
  bool is_anonymous = 9;
}

// 获取骑手评分统计请求
message GetRiderRatingStatsRequest {
  int64 rider_id = 1;           // 骑手ID
  string date_range = 2;        // 时间范围(7d/30d/90d)
}

// 获取骑手评分统计响应
message GetRiderRatingStatsReply {
  double average_rating = 1;    // 平均评分
  int32 total_ratings = 2;      // 总评价数
  int32 five_star_count = 3;    // 5星数量
  int32 four_star_count = 4;    // 4星数量
  int32 three_star_count = 5;   // 3星数量
  int32 two_star_count = 6;     // 2星数量
  int32 one_star_count = 7;     // 1星数量
  double praise_rate = 8;       // 好评率
  repeated RatingTagStats tag_stats = 9; // 标签统计
}

// 评价标签统计
message RatingTagStats {
  string tag = 1;
  int32 count = 2;
}

// 提交投诉请求
message SubmitComplaintRequest {
  int64 rider_id = 1;           // 骑手ID
  int64 order_id = 2;           // 订单ID(可选)
  string complaint_type = 3;    // 投诉类型
  string content = 4;           // 投诉内容
  repeated string images = 5;   // 投诉图片
  string contact_phone = 6;     // 联系电话
}

// 提交投诉响应
message SubmitComplaintReply {
  bool success = 1;
  string message = 2;
  int64 complaint_id = 3;
  string ticket_no = 4;         // 工单号
}

// 获取投诉列表请求
message GetComplaintsRequest {
  int64 rider_id = 1;           // 骑手ID
  int32 page = 2;               // 页码
  int32 page_size = 3;          // 每页数量
  string status = 4;            // 状态筛选
}

// 获取投诉列表响应
message GetComplaintsReply {
  repeated ComplaintInfo complaints = 1;
  int32 total = 2;
}

// 投诉信息
message ComplaintInfo {
  int64 id = 1;
  string ticket_no = 2;         // 工单号
  string complaint_type = 3;    // 投诉类型
  string content = 4;           // 投诉内容
  string status = 5;            // 处理状态
  string reply = 6;             // 处理回复
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}
